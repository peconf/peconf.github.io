<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEConf - Product Engineers Community</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <style>
        /* 기본 리셋 및 폰트 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 브라우저 전체 뷰포트를 채우는 설정 */
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden; /* 스크롤 방지 (풀스크린 원페이지) */
        }

        /* O'Reilly에서 영감을 받은 색상 팔레트와 추상적인 배경 그래픽 */
        .page-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #f3efe6; /* 베이지색 기본 배경 */
            background-image: 
                linear-gradient(135deg, #1a2530 0%, #1a2530 30%, transparent 30%, transparent 100%),
                linear-gradient(225deg, #d36446 0%, #d36446 15%, transparent 15%, transparent 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 추상적인 CSS Blobs 배경 요소 - 책 표지 모양 탈피 */
        .blob-bg {
            position: absolute;
            transition: all 0.5s ease;
            z-index: 1;
        }

        .blob-1 {
            width: 70%;
            height: 70%;
            bottom: -20%;
            left: -10%;
            background-color: #708259; /* 그린 */
            border-radius: 40% 60% 70% 30% / 50% 60% 40% 50%;
            opacity: 0.7;
        }

        .blob-2 {
            width: 50%;
            height: 50%;
            top: 20%;
            right: -10%;
            background-color: #d36446; /* 오렌지 */
            border-radius: 60% 40% 30% 70% / 60% 50% 60% 40%;
            opacity: 0.5;
        }

        /* 헤더: 로고 및 언어 스위치 */
        header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #d36446; /* 오렌지 브랜드 컬러 */
        }

        .brand img {
            width: 48px;
            height: 48px;
        }

        .brand h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        /* 단순 언어 스위치 (EN/KO 토글) */
        .lang-switch {
            background-color: white;
            padding: 6px;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 2px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
        }

        .lang-switch button {
            appearance: none;
            border: 0;
            background: transparent;
            padding: 8px 20px;
            border-radius: 20px;
            color: #4b5563;
            transition: background-color 0.3s ease, color 0.3s ease;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        .lang-switch button.active {
            background-color: #d36446; /* 선택된 언어 배경 */
            color: white;
        }

        .lang-switch button:focus-visible {
            outline: 2px solid #1a2530;
            outline-offset: 2px;
        }

        /* 메인 콘텐츠: 핵심 메시지 (중앙 배치) */
        main {
            position: relative;
            z-index: 5;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .hero-content {
            max-width: 800px;
        }

        .title-group {
            margin-bottom: 30px;
        }

        .subtitle {
            font-size: 3.5rem;
            font-weight: 800;
            color: #1a2530; /* 네이비 색상 */
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
            text-shadow: 0 1px 0 rgba(247, 242, 234, 0.55), 0 0 8px rgba(247, 242, 234, 0.18);
        }

        .description {
            font-size: 1.4rem;
            font-weight: 500;
            color: #4b5563;
            line-height: 1.6;
            margin-top: 15px;
            text-shadow: 0 1px 0 rgba(247, 242, 234, 0.55), 0 0 6px rgba(247, 242, 234, 0.16);
        }

        /* 한국어 텍스트에 대한 타이포그래피 미세 조정 */
        html[lang="ko"] .subtitle {
            font-size: 3rem;
            letter-spacing: -1px;
        }

        /* 푸터: 뱃지 및 정보 */
        footer {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 40px;
        }

        .footer-copy {
            font-size: 0.85rem;
            font-weight: 500;
            color: #4b5563;
            text-shadow: 0 1px 0 rgba(247, 242, 234, 0.35);
            white-space: nowrap;
        }

        /* 완벽한 반응형 (미디어 쿼리) */

        /* 데스크탑에서 테블릿으로 (1024px 이하) */
        @media (max-width: 1024px) {
            .subtitle { font-size: 3rem; }
            .description { font-size: 1.2rem; }
            html[lang="ko"] .subtitle { font-size: 2.6rem; }
        }

        /* 테블릿에서 모바일로 (768px 이하) */
        @media (max-width: 768px) {
            header { padding: 20px; gap: 16px; }
            .brand h1 { font-size: 1.5rem; }
            .brand img { width: 40px; height: 40px; }
            .lang-switch { justify-content: flex-start; align-self: auto; }
            .lang-switch button { text-align: center; }

            main { padding: 20px; }
            .subtitle { font-size: 2.4rem; letter-spacing: -1px; }
            .description { font-size: 1.1rem; }
            html[lang="ko"] .subtitle { font-size: 2.1rem; }

            footer { padding: 20px; width: 100%; justify-content: center; }
            .footer-copy { text-align: center; }
        }

        /* 작은 모바일 (480px 이하) */
        @media (max-width: 480px) {
            .subtitle { font-size: 2rem; }
            html[lang="ko"] .subtitle { font-size: 1.8rem; }
            .description { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <div class="blob-bg blob-1"></div>
        <div class="blob-bg blob-2"></div>

        <header>
            <div class="brand">
                <img src="./assets/logo-mark.svg" alt="PEConf Logo Mark">
                <h1>PEConf</h1>
            </div>
            <div class="lang-switch" id="lang-toggle" role="group" aria-label="Language switch">
                <button type="button" id="btn-en" aria-pressed="true">EN</button>
                <button type="button" id="btn-ko" aria-pressed="false">KO</button>
            </div>
        </header>

        <main>
            <div class="hero-content">
                <div class="title-group">
                    <h2 class="subtitle" id="text-subtitle">A community for product engineers</h2>
                </div>
                <p class="description" id="text-desc">We share what we learn while building products: how we work, what we struggle with, and how we grow.</p>
            </div>
        </main>

        <footer>
            <p class="footer-copy">© 2026 PEConf. All rights reserved.</p>
        </footer>

    </div>

    <script>
        // 번역 데이터 (의미가 자연스럽게 전달되는 의역 포함)
        const translations = {
            en: {
                subtitle: "A community for<br>product engineers",
                desc: "We share what we learn while building products: how we work, what we struggle with, and how we grow."
            },
            ko: {
                subtitle: "프로덕트 엔지니어를 위한 커뮤니티",
                desc: "프로덕트를 만들며 배운 것들을 공유합니다. 일하는 방식, 마주한 고민, 그리고 함께 성장해 나가는 이야기를 나눕니다."
            }
        };

        // DOM 요소 캐싱
        const html = document.documentElement;
        const subtitleEl = document.getElementById('text-subtitle');
        const descEl = document.getElementById('text-desc');
        const langToggle = document.getElementById('lang-toggle');
        const btnEn = document.getElementById('btn-en');
        const btnKo = document.getElementById('btn-ko');

        // 언어 변경 함수
        function setLanguage(lang) {
            html.lang = lang;
            subtitleEl.innerHTML = translations[lang].subtitle;
            descEl.textContent = translations[lang].desc;
            
            // 토글 버튼 스타일 활성화
            if (lang === 'en') {
                btnEn.classList.add('active');
                btnKo.classList.remove('active');
                btnEn.setAttribute('aria-pressed', 'true');
                btnKo.setAttribute('aria-pressed', 'false');
            } else {
                btnKo.classList.add('active');
                btnEn.classList.remove('active');
                btnKo.setAttribute('aria-pressed', 'true');
                btnEn.setAttribute('aria-pressed', 'false');
            }
        }

        // 브라우저 언어 감지 및 초기 세팅
        function initLanguage() {
            const userLang = navigator.language || navigator.userLanguage;
            const defaultLang = userLang.startsWith('ko') ? 'ko' : 'en';
            setLanguage(defaultLang);
        }

        // 언어 토글 스위치 이벤트 리스너
        langToggle.addEventListener('click', (e) => {
            const button = e.target.closest('button');
            if (!button) return;

            const targetId = button.id;
            if (targetId === 'btn-en') {
                setLanguage('en');
            } else if (targetId === 'btn-ko') {
                setLanguage('ko');
            }
        });

        // 초기화 실행
        initLanguage();
    </script>
</body>
</html>
